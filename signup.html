<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicons/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg" />
  <link rel="shortcut icon" href="/favicons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Curvage" />
  <link rel="manifest" href="/favicons/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <title>Document</title>
</head>
<body>
  <header>
    <h1><img src="images/Curvagelogo.png" alt="この学習アプリ'Curvage'のロゴ"></h1>
    <button id="log-out">ログアウト</button>
  </header>
  <main>
    <div id="applyspace">
      <form id="apply">
        <dl>
          <dt><label for="add-words">Word</label></dt>
          <dd><input type="text" name="words" id="add-words" placeholder="単語を入力…" required></dd>
        </dl>
        <dl>
          <dt><label for="add-meanings">Meanings</label></dt>
          <dd><input type="text" name="meanings" id="add-meanings" placeholder="意味を入力…" required></dd>
        </dl>
        <div><input type="submit" id="register" value="登録"></div>
      </form>
      <p>例: curve - 曲線</p>
    </div>
   
    <div class="filter-content">
      <div id="filter">
        <div class="select-title"><span>絞り込み:</span><span class="currentvalue">すべて</span><span class="arrow"></span></div>
        <ul class="select-options">
          <li class="options" data-value="all">すべて</li>
          <li class="options" data-value="learning">学習中</li>
          <li class="options" data-value="weak">苦手</li>
          <li class="options" data-value="forget">要復習</li>
        </ul>
      </div>
      <div id="type">
        <input type="radio" name="type" value="all" id="all" checked><label for="all">すべて</label>
        <input type="radio" name="type" value="word" id="word"><label for="word">単語</label>
        <input type="radio" name="type" value="phrase" id="phrase"><label for="phrase">熟語</label>
      </div>
      <span id="total"></span>
      <div class="page">
        <button id="prev-btn">前へ</button>
        <div class="currentpage">
          <label for="pc-only">
            <p>Page</p>
          </label>
          <input type="text" id="pc-only" mode="numeric" >
          <select id="select"></select>
        </div>
        <button id="next-btn">次へ</button>
      </div>
    </div>
  <!-- 学習したフレーズを表形式で表示 -->
    <table>
      <thead>
        <tr>
          <th>Target / Vocab</th>
          <th>意味</th>
          <th>状態</th>
          <th>登録日</th>
          <th>削除</th>
        </tr>
      </thead>
      <tbody id="tbody">

      </tbody>
    </table>
  </main>
  <div id="modal-signup">
    <div id="signup-content">
      <form id="signup-form">
        <p>Sign Up</p>
        <dl>
          <dt><label for="username">ユーザー名</label></dt>
          <dd><input type="text" name="username" id="username" placeholder="3〜15文字の半角英数字(小文字・_可)" inputmode="email" autocapitalize="none" spellcheck="false"></dd>
        </dl>
        <dl>
          <dt><label for="password">パスワード</label></dt>
          <dd><input type="password" name="password" id="password" placeholder="英字・数字・記号を組み合わせた8文字以上"></dd>
        </dl>
        <dl>
          <dt><label for="repassword">パスワード(確認用)</label></dt>
          <dd><input type="password" name="repassword" id="repassword" placeholder="英字・数字・記号を組み合わせた8文字以上"></dd>
        </dl>
        <span id="sign-status"></span>
        <button type="submit" id="signup-sub"><span id="btntxt">Sign Up</span><div id="spinner"></div><span id="checkicon"></span></button>
      </form>
    </div>
  </div>
  <script src="js/signup.js"></script>
</body>
</html>
