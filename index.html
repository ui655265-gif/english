<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicons/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg" />
  <link rel="shortcut icon" href="/favicons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Curvage" />
  <link rel="manifest" href="/favicons/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <title>Curvage</title>
</head>
<body>
  <header>
    <h1><img src="images/Curvagelogo.png" alt="この学習アプリ'Curvage'のロゴ"></h1>
    <button id="log-out">ログアウト</button>
  </header>
  <main>
    <div id="applyspace">
      <form id="apply">
        <dl>
          <dt><label for="add-words">Word</label></dt>
          <dd><input type="text" name="words" id="add-words" placeholder="単語を入力…" inputmode="email" autocapitalize="none" required></dd>
        </dl>
        <dl>
          <dt><label for="add-meanings">Meanings</label></dt>
          <dd><input type="text" name="meanings" id="add-meanings" placeholder="意味を入力…" required></dd>
        </dl>
        <div><input type="submit" id="register" value="登録"></div>
      </form>
      <p>例: curve - 曲線</p>
    </div>
    <div class="filter-content">
      <div id="filter">
        <div class="select-title"><span>絞り込み:</span><span class="currentvalue">すべて</span><span class="arrow"></span></div>
        <ul class="select-options">
          <li class="options" data-value="all">すべて</li>
          <li class="options" data-value="learning">学習中</li>
          <li class="options" data-value="weak">苦手</li>
          <li class="options" data-value="forget">要復習</li>
        </ul>
      </div>
      <div id="type">
        <input type="radio" name="type" value="all" id="all" checked><label for="all">すべて</label>
        <input type="radio" name="type" value="word" id="word"><label for="word">単語</label>
        <input type="radio" name="type" value="phrase" id="phrase"><label for="phrase">熟語</label>
      </div>
      <span id="total"></span>
      <div class="page">
        <button id="prev-btn"></button>
        <div class="currentpage">
          <div id="pc">
            <label for="pc-only">
              <p>Page</p>
            </label>
            <input type="text" id="pc-only" mode="numeric" >
          </div>
          <!-- <select id="select"></select> -->
          <div id="selectpage">
            <p>Page</p>
            <span id="selected">1</span><span class="pagearrow"></span>
            <ul id="select"></ul>
          </div>
        </div>
        <button id="next-btn"></button>
      </div>
    </div>
  <!-- 学習したフレーズを表形式で表示 -->
    <table>
      <colgroup id="colgroup"><col style="width: 25%;"><col style="width: 25%;"><col style="width:20%;"><col style="width:18%;"><col style="width: 12%;"></colgroup>
      <thead id="thead">
        <tr>
          <th><button id="visiword">Word</button></th>
          <th><button id="visimeanings">Meanings</button></th>
          <th>Status</th>
          <th class="date">Date</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="tbody">

      </tbody>
    </table>
  </main>
  <div id="modal-delete">
    <div id="delete-content">
      <p>本当に削除しますか？</p>
      <p>このデータは元に戻せません</p>
      <div class="btns">
        <button id="del-btn" class="del-btn">削除</button>
        <button id="cancel-btn" class="cancel-btn">閉じる</button>
      </div>
    </div>
  </div>
  <div id="modal-login">
    <div id="login-content">
      <form id="log-form">
        <dl>
          <dt><label for="name">ユーザー名</label></dt>
          <dd><input type="text" name="name" id="name" placeholder="Enter Your Username"></dd>
        </dl>
        <dl>
          <dt><label for="password">パスワード</label></dt>
          <dd><input type="password" name="password" id="password" placeholder="Enter Your Password"></dd>
        </dl>
        <span id="log-status"></span>
        <button type="submit" id="log-sub"><span id="btntxt">ログイン</span><div id="spinner"></div><span id="checkicon"></span></button>
      </form>
      <a href="signup.html">
        <p>新規登録はこちらから</p>
      </a>
    </div>
  </div>
  <script src="js/index.js"></script>
</body>
</html>
