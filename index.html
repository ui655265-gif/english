<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <title>Curvage</title>
</head>
<body>
  <header>
    <h1><img src="images/Curvagelogo.png" alt="この学習アプリ'Curvage'のロゴ"></h1>
    <button id="log-out">ログアウト</button>
  </header>
  <main>
    <div id="applyspace">
      <form id="apply">
        <dl>
          <dt><label for="add-words">Word</label></dt>
          <dd><input type="text" name="words" id="add-words" placeholder="単語を入力…" required></dd>
        </dl>
        <dl>
          <dt><label for="add-meanings">Meanings</label></dt>
          <dd><input type="text" name="meanings" id="add-meanings" placeholder="意味を入力…" required></dd>
        </dl>
        <div><input type="submit" id="register" value="登録"></div>
      </form>
      <p>例: curve - 曲線</p>
    </div>
    <div class="filter-content">
      <select name="filter" id="filter">
        <option value="all">すべて</option>
        <option value="learning">学習中</option>
        <option value="weak">苦手なもの</option>
        <option value="forget">今日復習すべきもの</option>
      </select>
      <select name="type" id="type">
        <option value="all">すべて</option>
        <option value="word">単語</option>
        <option value="phrase">イディオム</option>
      </select>
      <span id="total"></span>
      <button id="prev-btn">前へ</button>
      <div>
        <label for="pc-only">
          <p>Page</p>
        </label>
        <input type="text" id="pc-only" mode="numeric" >
      </div>
      <select id="select"></select>
      <button id="next-btn">次へ</button>
    </div>
  <!-- 学習したフレーズを表形式で表示 -->
    <table>
      <colgroup><col style="width: 25%;"><col style="width: 25%;"><col style="width:20%;"><col style="width:20%;"><col style="width: 10%;"></colgroup>
      <thead id="thead">
        <tr>
          <th><button id="visiword">Word</button></th>
          <th><button id="visimeanings">Meanings</button></th>
          <th>Status</th>
          <th>Date</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="tbody">

      </tbody>
    </table>
  </main>
  <div id="modal-delete">
    <div id="delete-content">
      <p>本当に削除しますか？</p>
      <div class="btns">
        <button id="del-btn" class="del-btn">削除</button>
        <button id="cancel-btn" class="cancel-btn">やめる</button>
      </div>
    </div>
  </div>
  <div id="modal-login">
    <div id="login-content">
      <form id="log-form">
        <dl>
          <dt><label for="name">ユーザー名</label></dt>
          <dd><input type="text" name="name" id="name" placeholder="Enter Your Username"></dd>
        </dl>
        <dl>
          <dt><label for="password">パスワード</label></dt>
          <dd><input type="password" name="password" id="password" placeholder="Enter Your Password"></dd>
        </dl>
        <span id="log-status"></span>
        <button type="submit" id="log-sub"><span id="btntxt">ログイン</span><div id="spinner"></div><span id="checkicon"></span></button>
      </form>
      <a href="signup.html">
        <p>新規登録はこちらから</p>
      </a>
    </div>
  </div>
  <script src="js/index.js"></script>
</body>
</html>
